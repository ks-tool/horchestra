# Casbin model mirroring Kubernetes RBAC granularity, cluster-wide (no domain):
#   sub = subject ("user:<name>" / "group:<name>")
#   obj = "<group>/<resource>" (keyMatch supports "*" wildcards, e.g. "orch.ks-tool.dev/*")
#   act = verb (get/list/watch/create/update/delete; "*" = any)
# Policies are projected from rbac.ks-tool.dev/v1 Role/RoleBinding objects.

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = p.sub == r.sub && keyMatch(r.obj, p.obj) && (p.act == r.act || p.act == "*")
