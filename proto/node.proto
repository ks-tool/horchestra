syntax = "proto3";

package horchestra.node.v1;

// One shared generated package imported by both the agent (client) and the
// apiserver (server), so the `horchestra` monolith registers node.proto once.
option go_package = "github.com/ks-tool/horchestra/api/pb;pb";

// NodeService is the controller <-> node-agent transport: each node-agent opens
// one bidirectional stream (mTLS; the peer certificate CN is the node name). The
// agent sends status and log output up the stream; the controller pushes desired
// state and log requests down.
service NodeService {
  rpc Session(stream NodeMessage) returns (stream ControllerMessage);
}

message NodeMessage {
  oneof body {
    NodeStatus status = 1;
    LogChunk log_chunk = 2;
  }
}

// NodeStatus carries the full Node object (metadata + status) as JSON, reusing
// the api/v1 serialization instead of re-modelling it in protobuf.
message NodeStatus {
  bytes node = 1;
}

// LogChunk is a slice of an application's log output, correlated to a LogRequest
// by id. eof marks the end of the stream; error is set if the node could not read
// the logs.
message LogChunk {
  string id = 1;
  bytes data = 2;
  bool eof = 3;
  string error = 4;
}

message ControllerMessage {
  oneof body {
    DesiredState desired = 1;
    LogRequest log_request = 2;
    LogCancel log_cancel = 3;
  }
}

// DesiredState is the set the node must reconcile: every Application and
// PersistentVolume, each a JSON api/v1 object (the node filters to itself, the
// way it did when it listed them over REST).
message DesiredState {
  repeated bytes applications = 1;
  repeated bytes persistent_volumes = 2;
}

// LogRequest asks the node to stream one application's unit logs back up as
// LogChunks tagged with id. tail_lines caps the initial backlog (0 = all).
message LogRequest {
  string id = 1;
  string app = 2;
  bool follow = 3;
  int64 tail_lines = 4;
}

// LogCancel stops an in-progress LogRequest (e.g. the client disconnected).
message LogCancel {
  string id = 1;
}
