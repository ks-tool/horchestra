# Casbin model for horchestra RBAC. The policy is projected from Role/RoleBinding
# objects: each line is an explicit (subject, "group/resource", verb) tuple that a
# RoleBinding's subject is granted (group memberships are expanded to subjects in
# Go, so no role/grouping model is needed here). A request is allowed if any policy
# line matches it exactly.
[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = r.sub == p.sub && r.obj == p.obj && r.act == p.act
